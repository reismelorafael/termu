name: Sign & Release APK — Termux RAFCODEΦ

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a GitHub release from the signed APK
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sign-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # Decode keystore — written to a path outside the workspace
      # so it is never accidentally included in build artifacts
      - name: Decode release keystore
        run: printf '%s' "$KEYSTORE_B64" | base64 -d > /tmp/release.jks
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Build signed release APK
        env:
          TERMUX_ENABLE_RELEASE_SIGNING: "true"
          TERMUX_RELEASE_KEYSTORE_FILE: /tmp/release.jks
          TERMUX_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          TERMUX_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          TERMUX_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          TERMUX_BOOTSTRAP_BAREMETAL_STRICT: "true"
        run: ./gradlew app:assembleRelease

      - name: Upload signed APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: termux-rafacodephi-signed-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
