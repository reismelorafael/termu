# ci_abis: arm64-v8a
name: bootstrap-arm64-asm-sanity

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/src/main/cpp/lowlevel/bootstrap_src/**'
      - '.github/workflows/bootstrap-arm64-asm-sanity.yml'

jobs:
  assemble-arm64-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assemble ARM64 bootstrap draft (isolated)
        run: |
          clang --target=aarch64-linux-android21 -c \
            app/src/main/cpp/lowlevel/bootstrap_src/bootstrap_arm64_adaptive.S \
            -o dist/bootstrap/bootstrap_arm64_adaptive.o
      - name: Upload bootstrap object artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-arm64-asm-object-${{ github.sha }}
          path: dist/bootstrap/bootstrap_arm64_adaptive.o
