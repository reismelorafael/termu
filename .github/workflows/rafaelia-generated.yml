# ci_track: ops
# ci_abis: n/a
name: rafaelia-generated-artifacts

on:
  push:
    paths:
      - 'rmr/Rrr/generated/**'
      - 'rmr/Rrr/rafaelia_jni_direct.c'
      - 'rmr/Rrr/RafaeliaCore.java'
      - '.github/workflows/rafaelia-generated.yml'
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install simulator deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib
      - name: Run QPU simulator
        run: |
          mkdir -p ci_artifacts/generated
          python rmr/Rrr/generated/rafaelia_qpu_simulator.py
          cp rmr/Rrr/generated/rafaelia_metrics.png ci_artifacts/generated/
      - name: Run auto calibration
        run: |
          python rmr/Rrr/generated/rafaelia_auto_calibration.py > ci_artifacts/generated/calibration_result.txt
      - name: Archive generated binaries/artifacts
        run: |
          cp rmr/Rrr/generated/rafaelia_isa_spec.md ci_artifacts/generated/
          cp rmr/Rrr/generated/rafaelia_ctrl_fpga.sv ci_artifacts/generated/
          cp rmr/Rrr/generated/rafaelia_whitepaper.tex ci_artifacts/generated/
          cp rmr/Rrr/generated/KNOWLEDGE_FLOW_MATRIX.md ci_artifacts/generated/
          tar -czf rafaelia_generated_artifacts.tar.gz -C ci_artifacts/generated .
      - uses: actions/upload-artifact@v4
        with:
          name: rafaelia-generated
          path: rafaelia_generated_artifacts.tar.gz
