name: Rafaelia Native Safety

on:
  pull_request:
  push:
    branches:
      - master
      - next-evolution-native-safety

jobs:
  native-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Rafaelia native safety contracts
        run: python3 scripts/verify_rafaelia_native_safety.py
