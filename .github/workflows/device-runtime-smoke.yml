# ci_track: ops
# ci_abis: n/a
name: device-runtime-smoke
on:
  workflow_dispatch:
    inputs:
      apk_path:
        description: 'APK path'
        required: false
        type: string
jobs:
  device-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Device smoke (report mode)
        if: ${{ vars.DEVICE_SMOKE_REQUIRED != 'true' }}
        run: ./scripts/device_runtime_smoke.sh "${{ inputs.apk_path }}" || true
      - name: Device smoke (required gate)
        if: ${{ vars.DEVICE_SMOKE_REQUIRED == 'true' }}
        env:
          DEVICE_SMOKE_REQUIRED: 'true'
        run: ./scripts/device_runtime_smoke.sh "${{ inputs.apk_path }}"
      - uses: actions/upload-artifact@v7
        with:
          name: device-runtime-reports
          path: reports/*
