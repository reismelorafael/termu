name: arme-add-governance

on:
  pull_request:
    paths:
      - 'Arme/Add/**'
      - 'Arme/manifest.json'
      - 'scripts/check_arme_add_manifest.sh'
  push:
    branches: [ main ]
    paths:
      - 'Arme/Add/**'
      - 'Arme/manifest.json'
      - 'scripts/check_arme_add_manifest.sh'

jobs:
  enforce-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check new staged native files are declared in manifest
        run: |
          chmod +x scripts/check_arme_add_manifest.sh
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            scripts/check_arme_add_manifest.sh "origin/${{ github.base_ref }}"
          else
            scripts/check_arme_add_manifest.sh "HEAD~1"
          fi
