# ci_track: ops
# ci_abis: n/a
name: Real Pkg Promotion Contract

on:
  push:
    branches: [ master ]
    paths:
      - scripts/device_pkg_smoke.sh
      - docs/ENGINEERING_RUNBOOK_RAFCODEPHI.md
      - docs/RUNTIME_TRUTH_TABLE.md
      - docs/audits/REAL_PKG_PROMOTION_CONTRACT.md
      - docs/audits/PKG_REAL_NEXT_PR_MARKER.md
      - tests/test_device_pkg_smoke_contract.py
      - tests/test_real_pkg_promotion_contract.py
      - tests/test_pkg_real_next_pr_marker.py
      - .github/workflows/validate-real-pkg-promotion-contract.yml
  pull_request:
    paths:
      - scripts/device_pkg_smoke.sh
      - docs/ENGINEERING_RUNBOOK_RAFCODEPHI.md
      - docs/RUNTIME_TRUTH_TABLE.md
      - docs/audits/REAL_PKG_PROMOTION_CONTRACT.md
      - docs/audits/PKG_REAL_NEXT_PR_MARKER.md
      - tests/test_device_pkg_smoke_contract.py
      - tests/test_real_pkg_promotion_contract.py
      - tests/test_pkg_real_next_pr_marker.py
      - .github/workflows/validate-real-pkg-promotion-contract.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-pkg-promotion-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run real pkg promotion contract tests
        run: |
          python3 -m pytest -q \
            tests/test_device_pkg_smoke_contract.py \
            tests/test_real_pkg_promotion_contract.py \
            tests/test_pkg_real_next_pr_marker.py
