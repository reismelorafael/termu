buildscript {
    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.13.2"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url = "https://jitpack.io" }
    }
}

tasks.register("verifyReleaseContract", Exec) {
    group = "verification"
    description = "Validates release APK contract for official/internal CI tracks."
    workingDir rootProject.projectDir
    commandLine "bash", "scripts/verify_release_contract.sh"
}
